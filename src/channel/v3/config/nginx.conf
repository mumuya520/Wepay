# WePay V3 Nginx 配置
# 用于反向代理、负载均衡、限流、SSL终止

# 限流区域定义
# 按IP限流：每秒10个请求
limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=10r/s;

# 按设备ID限流：每秒20个请求
limit_req_zone $http_x_device_id zone=device_limit:10m rate=20r/s;

# 按商户ID限流：每秒50个请求
limit_req_zone $http_x_merchant_id zone=merchant_limit:10m rate=50r/s;

# 连接数限制：每个IP最多10个并发连接
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# 上游服务器组（多实例负载均衡）
upstream wepay_v3_backend {
    # 负载均衡策略：least_conn（最少连接）
    least_conn;

    # 后端服务器列表
    server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;

    # 健康检查
    keepalive 32;
    keepalive_timeout 60s;
}

# HTTP服务器（重定向到HTTPS）
server {
    listen 80;
    server_name wepay.example.com;

    # 强制跳转HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name wepay.example.com;

    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/wepay.crt;
    ssl_certificate_key /etc/nginx/ssl/wepay.key;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志配置
    access_log /var/log/nginx/wepay_access.log combined;
    error_log /var/log/nginx/wepay_error.log warn;

    # 请求体大小限制（支付截图上传）
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # 超时配置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # WebSocket支持
    location /api/wepay/v3/ws {
        proxy_pass http://wepay_v3_backend;

        # WebSocket升级
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket超时（5分钟）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 限流：每个IP最多5个WebSocket连接
        limit_conn conn_limit 5;
    }

    # 心跳接口（高频，宽松限流）
    location /api/wepay/v3/heart {
        # 限流：每秒20个请求，突发30个
        limit_req zone=ip_limit burst=30 nodelay;
        limit_req zone=device_limit burst=40 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 支付推送接口（核心接口，严格限流）
    location /api/wepay/v3/push {
        # 限流：每秒10个请求，突发15个
        limit_req zone=ip_limit burst=15 nodelay;
        limit_req zone=device_limit burst=20 nodelay;
        limit_req zone=merchant_limit burst=30 nodelay;

        # 连接数限制
        limit_conn conn_limit 10;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # OCR上传接口（大文件，特殊配置）
    location /api/wepay/v3/ocr {
        # 限流：每秒5个请求
        limit_req zone=ip_limit burst=10 nodelay;
        limit_req zone=device_limit burst=10 nodelay;

        # 大文件上传
        client_max_body_size 20M;
        client_body_timeout 120s;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 设备注册/解绑（低频接口）
    location ~ ^/api/wepay/v3/device/(register|unbind)$ {
        # 限流：每秒2个请求
        limit_req zone=ip_limit burst=5 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 待单查询接口
    location /api/wepay/v3/pending {
        # 限流：每秒10个请求
        limit_req zone=ip_limit burst=20 nodelay;
        limit_req zone=device_limit burst=20 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 手动回调接口（管理员操作）
    location /api/wepay/v3/callback/manual {
        # 限流：每秒1个请求
        limit_req zone=ip_limit burst=3 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 健康检查接口（不限流）
    location /health {
        proxy_pass http://wepay_v3_backend;
        access_log off;
    }

    # 监控指标接口（内网访问）
    location /metrics {
        # 仅允许内网访问
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://wepay_v3_backend;
        access_log off;
    }

    # 其他API接口（通用限流）
    location /api/wepay/v3/ {
        # 限流：每秒10个请求
        limit_req zone=ip_limit burst=20 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 静态文件（前端UI）
    location / {
        root /var/www/wepay/ui;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态文件缓存
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 限流错误页面
    error_page 429 /429.html;
    location = /429.html {
        root /var/www/wepay/error;
        internal;
    }

    # 通用错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/wepay/error;
        internal;
    }
}

# 管理后台（独立域名，额外安全措施）
server {
    listen 443 ssl http2;
    server_name admin.wepay.example.com;

    # SSL证书
    ssl_certificate /etc/nginx/ssl/admin.wepay.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.wepay.key;

    # SSL配置（同上）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # IP白名单（仅允许管理员IP访问）
    allow 192.168.1.100;  # 管理员办公室IP
    allow 10.0.0.0/24;    # 内网IP段
    deny all;

    # 日志
    access_log /var/log/nginx/wepay_admin_access.log combined;
    error_log /var/log/nginx/wepay_admin_error.log warn;

    # 管理后台API
    location /api/ {
        # 严格限流
        limit_req zone=ip_limit burst=5 nodelay;

        proxy_pass http://wepay_v3_backend;
        include /etc/nginx/proxy_params.conf;
    }

    # 管理后台前端
    location / {
        root /var/www/wepay/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
